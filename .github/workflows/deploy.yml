name: CI/CD Pipeline to DigitalOcean

on:
  push:
    branches:
      - main # Triggers the build whenever you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Step 1: Check out the repository source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 21 environment on the GitHub runner
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Automatically caches dependencies for speed

      # Step 3: Build the production Fat JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 5a: Bootstrap the Droplet and back up the current JAR
      - name: Prepare Droplet for Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Install Java 21 if not present
            if ! java -version 2>&1 | grep -q '21'; then
              apt-get update -y && apt-get install -y openjdk-21-jre-headless
            fi

            # Create unprivileged service user if it doesn't exist
            if ! id -u iwura &>/dev/null; then
              useradd -r -s /bin/false -d /opt/iwura iwura
            fi

            # Ensure app directory exists and is owned by the service user
            mkdir -p /opt/iwura
            chown iwura:iwura /opt/iwura

            # Back up the current JAR before the upload overwrites it
            if [ -f /opt/iwura/iwura.jar ]; then
              cp /opt/iwura/iwura.jar /opt/iwura/iwura.jar.bak
            fi

      # Step 5b: Securely upload the JAR to your Droplet via SCP
      - name: Copy JAR to DigitalOcean Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/iwura.jar"
          target: "/opt/iwura/"
          strip_components: 1

      # Step 6: Execute remote commands via SSH to restart the app
      - name: Restart Spring Boot Service on Droplet
        uses: appleboy/ssh-action@v1.0.3
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          JWT_REFRESH_EXPIRATION: ${{ secrets.JWT_REFRESH_EXPIRATION }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          ASKNIID: ${{ secrets.ASKNIID }}
          ASKNIIDPASSWORD: ${{ secrets.ASKNIIDPASSWORD }}
          APP_PORT: ${{ secrets.APP_PORT }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: MONGO_URL,DB_NAME,JWT_SECRET,JWT_EXPIRATION,JWT_REFRESH_EXPIRATION,GOOGLE_CLIENT_ID,ASKNIID,ASKNIIDPASSWORD,PORT
          script: |
            # Write secrets to the env file (overwritten on every deploy)
            {
              echo "MONGO_URL=$MONGO_URL"
              echo "DB_NAME=$DB_NAME"
              echo "JWT_SECRET=$JWT_SECRET"
              echo "JWT_EXPIRATION=$JWT_EXPIRATION"
              echo "JWT_REFRESH_EXPIRATION=$JWT_REFRESH_EXPIRATION"
              echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
              echo "ASKNIID=$ASKNIID"
              echo "ASKNIIDPASSWORD=$ASKNIIDPASSWORD"
              echo "APP_PORT=$APP_PORT"
            } > /etc/iwura.env
            chmod 600 /etc/iwura.env
            chown iwura:iwura /etc/iwura.env

            # Always overwrite the systemd service to pick up config changes
            cat > /etc/systemd/system/iwura.service << 'SERVICE'
            [Unit]
            Description=Iwura Vehicle Verification API
            After=network.target

            [Service]
            User=iwura
            Group=iwura
            EnvironmentFile=/etc/iwura.env
            ExecStart=/usr/bin/java -Djava.net.preferIPv4Stack=true -jar /opt/iwura/iwura.jar
            WorkingDirectory=/opt/iwura
            Restart=on-failure
            RestartSec=5
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            SERVICE
            systemctl daemon-reload
            systemctl enable iwura

            chown iwura:iwura /opt/iwura/iwura.jar

            # Restart the service to apply the updates
            systemctl restart iwura

            # Wait for the service to stabilise; roll back if it crashed
            sleep 25
            if ! systemctl is-active --quiet iwura; then
              echo "Service failed to start. Rolling back to previous JAR..."
              journalctl -u iwura --no-pager -n 50
              if [ -f /opt/iwura/iwura.jar.bak ]; then
                cp /opt/iwura/iwura.jar.bak /opt/iwura/iwura.jar
                chown iwura:iwura /opt/iwura/iwura.jar
                systemctl restart iwura
                echo "Rollback complete. Previous version restored."
              fi
              exit 1
            fi

            systemctl status iwura --no-pager