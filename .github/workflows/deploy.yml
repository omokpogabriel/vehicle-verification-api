name: CI/CD Pipeline to DigitalOcean

on:
  push:
    branches:
      - main # Triggers the build whenever you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up Java 21 environment on the GitHub runner
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Automatically caches dependencies for speed

      # Step 3: Run tests before building
      - name: Run Tests
        run: mvn test

      # Step 4: Build the production Fat JAR
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 5: Securely upload the JAR to your Droplet via SCP
      - name: Copy JAR to DigitalOcean Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.jar"
          target: "/root/"
          strip_components: 1 # Drops the "target/" prefix so it goes straight into /root/

      # Step 6: Execute remote commands via SSH to restart the app
      - name: Restart Spring Boot Service on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Write secrets to the env file (overwritten on every deploy)
            cat > /etc/iwura.env << 'EOF'
            MONGO_URL=${{ secrets.MONGO_URL }}
            DB_NAME=${{ secrets.DB_NAME }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            ASKNIIDMobile=${{ secrets.ASKNIID_MOBILE }}
            ASKNIIDMobilePassword=${{ secrets.ASKNIID_MOBILE_PASSWORD }}
            PORT=${{ secrets.PORT }}
            EOF
            chmod 600 /etc/iwura.env

            # Rename the uploaded file to match the systemd service
            mv /root/*.jar /root/iwura.jar

            # Restart the service to apply the updates
            sudo systemctl restart iwura

            # Verify the service status is active
            sudo systemctl status iwura --no-pager