spring.application.name=vehicle-verification-api

server.port=${PORT:8002}
server.tomcat.threads.max=400
server.tomcat.connection-timeout=10000

spring.data.mongodb.uri=${MONGO_URL}
spring.data.mongodb.database=${DB_NAME:naijaVehicle}
spring.data.mongodb.auto-index-creation=true
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=24h,maximumSize=10000
spring.threads.virtual.enabled=true

# NIID Ask API credentials (used by AskNiidService)
# Set these in your environment or directly in this file.
askniid.insurance.user=${ASKNIID}
askniid.insurance.pass=${ASKNIIDPASSWORD}
# NIID SearchType value to use when looking up by plate/policy
askniid_search_type=Registration Number

# Logging
logging.level.root=INFO
logging.level.com.naijavehicle=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID}

