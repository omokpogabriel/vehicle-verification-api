[phases.setup]
# Installs openssl and ensures the keytool is available
aptPkgs = ['...your other packages...', 'ca-certificates']

[phases.build]
# This command imports the cert into the JVM's default trust store
cmds = [
    'echo "yes" | $JAVA_HOME/bin/keytool -import -trustcacerts -keystore $JAVA_HOME/lib/security/cacerts -storepass changeit -alias niid-cert -file niid.crt',
    '...your normal build command (e.g., mvn clean install)...'
]